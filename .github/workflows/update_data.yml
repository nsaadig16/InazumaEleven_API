name: Update player data

on:
  schedule:
    - cron: '0 0 1 * *' 
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v2

      - name: Install dependencies
        run: uv sync

      - name: Run update
        run: uv run python update.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/players.csv data/teams.csv
          git diff --staged --quiet || git commit -m "Auto update player data"
          git push
